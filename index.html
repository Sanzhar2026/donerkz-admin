<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DonerKz Админ-панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🌯</span>
                    <span class="logo-text">DonerKz</span>
                </div>
                <div class="header-info">
                    <span class="user-role" id="user-role">👤</span>
                    <span class="user-name" id="user-name">Загрузка...</span>
                    <button id="logout-btn" class="logout-btn">🚪</button>
                </div>
            </div>
        </header>
        <nav class="tabs" id="tabs-nav"></nav>
        <main class="content">
            <section id="orders-tab" class="tab-content active">
                <div class="tab-header">
                    <h2>📦 Заказы</h2>
                    <div class="filters">
                        <select id="status-filter">
                            <option value="all">Все статусы</option>
                            <option value="new">🆕 Новые</option>
                            <option value="confirmed">✅ Подтверждены</option>
                            <option value="cooking">🍳 Готовятся</option>
                            <option value="ready">✅ Готовы</option>
                            <option value="completed">🏁 Выполнены</option>
                            <option value="cancelled">❌ Отменены</option>
                        </select>
                        <button id="refresh-orders" class="btn-refresh">🔄</button>
                    </div>
                </div>
                <div id="orders-list"><div class="loading">Загрузка заказов...</div></div>
            </section>
            <section id="stats-tab" class="tab-content">
                <h2>📊 Статистика</h2>
                <div id="stats-grid"><div class="loading">Загрузка статистики...</div></div>
            </section>
            <section id="menu-tab" class="tab-content">
                <div class="tab-header">
                    <h2>📋 Меню</h2>
                    <button id="add-category-btn" class="btn btn-primary">➕ Добавить категорию</button>
                </div>
                <div id="menu-list"><div class="loading">Загрузка меню...</div></div>
            </section>
            <section id="staff-tab" class="tab-content">
                <h2>👥 Персонал</h2>
                <div class="tab-header">
                    <button id="add-staff-btn" class="btn btn-primary">➕ Добавить сотрудника</button>
                </div>
                <div id="staff-list"><div class="loading">Загрузка персонала...</div></div>
            </section>
            <section id="settings-tab" class="tab-content">
                <h2>⚙️ Настройки</h2>
                <div id="settings-content">
                    <div class="settings-card">
                        <h3>Информация о заведении</h3>
                        <div class="form-group">
                            <label>Название</label>
                            <input id="shop-name" value="DonerKz" />
                        </div>
                        <div class="form-group">
                            <label>Адрес</label>
                            <input id="shop-address" value="г. Алматы, ул. Абая 123" />
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input id="shop-phone" value="+7 778 964 8911" />
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()">💾 Сохранить</button>
                    </div>
                </div>
            </section>
        </main>
        <div id="modal-overlay" class="modal-overlay" style="display:none;">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modal-title">Добавить</h3>
                    <button id="modal-close" class="modal-close">✕</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>
        <div id="toast" class="toast" style="display:none;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
